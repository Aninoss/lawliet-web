bot.card.title = Was Lawliet zu bieten hat
bot.card.fishery.title = Fischerei (Economy)
bot.card.fishery.desc = Die Fischerei ist ein Economy-System, das die Aktivität der Benutzer fördert! Deine Servermitglieder fangen Fische, indem sie in Text- und Sprachkanälen aktiv sind. Fische können für Coins verkauft werden. Coins können ausgegeben werden, um das Fishing-Equipment zu verbessern und so deine kürzlichen Fisch-Fänge weiter zu erhöhen. Zusätzliche Features sind: Server-Ranglisten, virtuelle Glücksspiele, Schatztruhen, kaufbare Rollen und mehr!
bot.card.fishery.subtitle = L.fishery
bot.card.nsfw.title = NSFW
bot.card.nsfw.desc = Eine große Anzahl an NSFW-Befehlen, bei denen alle Ergebnisse nach bester Qualität gefiltert werden. Es können bis zu 20 Bilder, Gifs und Videos gleichzeitig angefordert werden!
bot.card.nsfw.subtitle =
bot.card.alerts.title = Alerts
bot.card.alerts.desc = Lass Lawliet automatisch die neuesten Anime-News, Crunchyroll-Releases, Reddit-Posts, Twitch-Status und vieles mehr posten! Füge einfach einen Alert zum Kanal hinzu!
bot.card.alerts.subtitle = L.alerts
bot.card.mod.title = Moderation
bot.card.mod.desc = Warn, Kick, Temp Ban, Perma Ban, Mute, Word Filter, Invite Filter - Alles was du brauchst, um deinen Server zivil zu halten!
bot.card.mod.subtitle =
bot.card.invitetracking.title = Invite Tracking
bot.card.invitetracking.desc = Behalte den Überblick über neue Mitglieder und ihre Einladungen und sieh dir nützliche Informationen an, wie z.B. die aktiven Mitglieder eines Einladenden und mehr!
bot.card.invitetracking.subtitle = L.invitetracking
bot.card.giveaways.title = Giveaways
bot.card.giveaways.desc = Starte Giveaways und lass deine Servermitglieder teilnehmen! Lawliet wählt die Gewinner automatisch aus!
bot.card.giveaways.subtitle = L.giveaway
bot.card.reactionroles.title = Reaction Roles
bot.card.reactionroles.desc = Lass deine Mitglieder voreingestellte Serverrollen mit Nachrichtenreaktionen erhalten!
bot.card.reactionroles.subtitle = L.reactionroles
bot.card.autoroles.title = Auto Roles
bot.card.autoroles.desc = Weise neuen Servermitgliedern automatisch Rollen zu!
bot.card.autoroles.subtitle = L.autoroles
bot.card.welcome.title = Mitglieder begrüßen
bot.card.welcome.desc = Begrüße neue Servermitglieder mit einem vordefinierten Text und automatisch generierten Bannern!
bot.card.welcome.subtitle = L.welcome
bot.card.tickets.title = Tickets
bot.card.tickets.desc = Wann immer Server-Mitglieder Hilfe benötigen, können sie einfach ein neues Support-Ticket erstellen, wodurch auch ein neuer privater Textkanal entsteht, in dem sie mit den Serverpersonal schreiben können!
bot.card.tickets.subtitle = L.ticket
bot.card.sugg.title = Servervorschläge
bot.card.sugg.desc = Lass deine Mitglieder Vorschläge für deinen Server erstellen und bewerten!
bot.card.sugg.subtitle = L.suggconfig
bot.card.autochannel.title = Auto Channel
bot.card.autochannel.desc = Deine Mitglieder können ihren eigenen Voicekanal erstellen und ihn nach Belieben anpassen! Sobald der letzte Nutzer die Verbindung trennt, wird er automatisch entfernt!
bot.card.autochannel.subtitle = L.autochannel
bot.card.roleplay.title = Anime Roleplay
bot.card.roleplay.desc = Unzählige lustige und interaktive Anime Roleplay-Befehle wie Hug, Kiss, Cuddle und vieles mehr!
bot.card.roleplay.subtitle =
bot.card.vote.title = Abstimmungen
bot.card.vote.desc = Erstelle ganz einfach Abstimmungen mit bis zu 9 verschiedenen Optionen!
bot.card.vote.subtitle = L.vote
bot.card.mcdisplays.title = Member Count Displays
bot.card.mcdisplays.desc = Zeige dein Serverwachstum, indem du deine Mitgliedszahlen in einem gesperrten Voice-Channel anzeigst!
bot.card.mcdisplays.subtitle = L.mcdisplays
bot.card.reminders.title = Erinnerungen
bot.card.reminders.desc = Füge einfach eine Erinnerung für dich oder deine Servermitglieder hinzu, damit du nie wieder ein wichtiges Event vergisst!
bot.card.reminders.subtitle = L.reminder
bot.card.txt2img.title = AI Bilder-Generierung (Pro)
bot.card.txt2img.desc = Erstelle Bilder aus Textaufforderungen mit Hilfe mehrerer fortschrittlicher KI-Modelle! Negative Aufforderungen und individuelle Gewichtungen werden bereits unterstützt.
bot.card.txt2img.subtitle = L.txt2img
bot.card.birthday.title = Geburtstagsbenachrichtigungen
bot.card.birthday.desc = Sende Benachrichtigungen, wenn Mitglieder Geburtstag haben und weise ihnen vorübergehend eine vordefinierte Rolle zu!
bot.card.birthday.subtitle = L.birthdayconfig
bot.card.allfeatures.title = Alle Befehle
bot.card.allfeatures.desc = Noch nichts gefunden? Dann schau dir die komplette Befehlsliste an oder suche nach bestimmten Begriffen!
bot.card.allfeatures.subtitle = L.help
bot.card.allfeatures.button = Zur Befehlsübersicht

bot.adv.0 = Kostenlos - Fast alle wichtigen Funktionen sind kostenlos und werden immer kostenlos sein!
