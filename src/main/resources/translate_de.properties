devvotes.desc = Zu Beginn eines jeden Monats können Premium-Abonnenten aus einer Reihe von Vorschlägen auswählen, welche neuen Funktionen sie gerne umgesetzt sehen möchten. Nach einer Woche werden die Vorschläge in absteigender Reihenfolge ihrer Stimmen bearbeitet. Allerdings werden bei weitem nicht alle Vorschläge umgesetzt!
devvotes.help = Welche neuen Funktionen würdest du gerne implementiert sehen? Du kannst mehrere auf einmal auswählen und deine Meinung auch nachträglich ändern.
