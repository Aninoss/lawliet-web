premium.desc.BASIC = Hol dir einen Schub in der Fischerei!
premium.desc.PRO = Schalte alle Premium-Funktionen für den gesamten Server frei!
premium.desc.ULTIMATE = Passe das Aussehen von Lawliet an und schalte alle Premium-Funktionen frei!
premium.perks.BASIC = Jederzeit online kündbar\n50% mehr Fische für L.daily\nAktiviere die automatischen Fischereifunktionen\nZugang zu monatlichen Entwicklungsabstimmungen, bei denen du darüber abstimmen kannst, welche neuen Bot-Funktionen implementiert werden sollen\n3 wöchentliche Boosts für Feature Requests\nZugriff auf den privaten Discord-Server mit priorisiertem Kundensupport\nEinzigartige goldene Embed-Farbe mit Krone für L.acc und L.gear
premium.perks.BASIC.notpremium = Schaltet keine Premium-Befehle frei
premium.perks.PRO = Jederzeit online kündbar\nBeinhaltet alle Vorteile des Basic-Levels für dich\nSchalte alle {0} Premium-Befehle frei\nSchalte auch zusätzliche Befehlsfunktionen frei und umgehe Beschränkungen\nFühre die Beta-Befehle 7 Tage vor der Veröffentlichung aus\nKeine Abklingzeiten für Befehle und maximal zwei Befehle gleichzeitig ausführen
premium.perks.ULTIMATE = Jederzeit online kündbar\nBeinhaltet alle Vorteile des Basic-Levels für dich\nErhalte eine eigene Instanz des Bots mit eigenem Benutzernamen, "Über mich"-Beschreibung, Avatar, Embed-Farbe und Aktivitäts-Tag\nSchalte automatisch alle Pro-Vorteile in allen Servern frei, die von der benutzerdefinierten Instanz bedient werden\nAlle Daten von Lawliet bleiben erhalten
premium.perks.autofeatures = Automatisch alle 4 Stunden arbeiten mit L.autowork\nAutomatisch Upvotes einfordern mit L.autoclaim\nVerkaufe automatisch alle Fische, wenn der Wechselkurs einen Schwellenwert überschreitet mit L.autosell\nAutomatisch Aktien auf dem Ingame-Aktienmarkt kaufen und verkaufen mit L.autostocks
premium.perks.premiumfeatures = Fischerei: Konfiguriere die Wahrscheinlichkeiten für Schatztruhen und Power-ups\nAlerts: Umgehe alle Server- und Kanal-Limits, verwende benutzerdefinierte Textanhänge und erhöhe das minimale Auslöseintervall\nTxt2img: Erstelle bis zu 50 Bilder pro Woche\nClear: Umgehen der Zeitbeschränkungen für Nachrichten\nBooru-Befehle: Bis zu 30 Dateien auf einmal anfordern, uneingeschränkter Videozugriff & "Mehr laden"-Button\nModeration: Entbannungsanträge konfigurieren\nReaction Roles: Umgehe das Limit für Rollennachrichten\nTickets: Ticketprotokolle bis zu 30 Tage lang speichern, schließe Tickets automatisch bei Inaktivität und erstelle Ticketnachrichten mit auswählbaren Themen\nAuto Roles: Alle Auto Roles mit allen aktuellen Server-Mitgliedern synchronisieren\nReminder: Wiederholungen konfigurieren\nBenutzerdefinierte Befehle: Umgehe alle Server-Limits
