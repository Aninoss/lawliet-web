#INFOS
bot.name = Lawliet Bot
bot.desc = Lawliet ist ein etablierter, stabiler und einfach zu bedienender Mehrzweck-Bot mit steigender Beliebtheit, der deinen Discord-Server fantastisch macht! Er bietet ein aktivitätsbasiertes Fischerei-Idle-Game / Economy, virtuelle Glücksspiele, hochwertige NSFW-Befehle, Moderation und vieles mehr!
bot.desc.nonsfw = Lawliet ist ein etablierter, stabiler und einfach zu bedienender Mehrzweck-Bot mit steigender Beliebtheit, der deinen Discord-Server fantastisch macht! Er bietet ein aktivitätsbasiertes Fischerei-Idle-Game / Economy, virtuelle Glücksspiele, Moderation und vieles mehr!
bot.invite = Lawliet hinzufügen
bot.title = Lawliet Bot - Stabiler und einfach zu bedienender Mehrzweck-Discord-Bot

