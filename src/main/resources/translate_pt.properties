premium.desc.ULTIMATE = Personalize a aparência do Lawliet e desbloqueie todos os recursos Premium!
premium.perks.BASIC = Cancele online a qualquer momento\n50% mais peixes para L.daily\nAtive recursos automáticos da pescaria\nAcesso a votos de desenvolvimento mensais onde você pode votar em quais novos recursos do bot implementar\n3 impulsos semanais para solicitações de recursos\nAcesso ao servidor Discord privado com suporte ao cliente priorizado\nCor de embed dourada única com coroa para L.acc e L.gear
premium.perks.BASIC.notpremium = Não desbloqueia comandos Premium
premium.perks.PRO = Cancele online a qualquer momento\nInclui todos os benefícios do nível Básico para você\nDesbloqueie todos os {0} comandos Premium\nTambém desbloqueie recursos adicionais de comando e ignore restrições de comando\nExecute comandos beta 7 dias antes do lançamento público\nSem cooldowns de comando e executando no máximo dois comandos ao mesmo tempo
premium.perks.ULTIMATE = Cancele online a qualquer momento\nInclui todos os benefícios do nível Básico para você\nObtenha uma instância dedicada do bot com nome de usuário, descrição sobre mim, avatar, cor de embed e tag de atividade personalizados\nDesbloqueie automaticamente todos os benefícios Pro em todos os servidores que são atendidos pela instância personalizada\nTodos os dados do Lawliet são mantidos
premium.perks.autofeatures = Trabalhe automaticamente a cada 4 horas com L.autowork\nResgate votos automaticamente com L.autoclaim\nVenda todos os peixes automaticamente quando a taxa de câmbio exceder um limite com L.autosell\nComprar e vender ações automaticamente no mercado de ações do jogo com L.autostocks
premium.perks.premiumfeatures = Pescaria: Configure probabilidades de baú do tesouro e power-up\nAlertas: Ignore todos os limites de servidor e canal, use anexos de texto personalizados & aumente intervalo mínimo de disparo\nTxt2img: Gere até 50 imagens por semana\nLimpar: Ignore restrições de tempo de mensagem\nComandos Booru: Solicite até 30 arquivos de uma vez, acesso irrestrito a vídeos & botão "Carregar Mais"\nModeração: Configure recursos de banimento\nCargos por Reação: Ignore limite de Mensagem de Cargo\nTickets: Salve protocolos por até 30 dias, feche tickets automaticamente por inatividade & crie mensagens de ticket com tópicos selecionáveis\nCargos Automáticos: Sincronize todos os cargos automáticos para todos os membros atuais do servidor\nLembretes: Configure repetições\nComandos Personalizados: Ignore todos os limites do servidor
