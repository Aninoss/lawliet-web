bot.card.title = O que o Lawliet tem a oferecer
bot.card.fishery.title = Pescaria (Economia)
bot.card.fishery.desc = A pescaria é um sistema de economia que incentiva a atividade do usuário! Os membros do seu servidor pescam peixes sendo ativos em canais de texto e voz. Peixes podem ser vendidos por moedas. Moedas podem ser gastas para melhorar equipamentos de pesca, aumentando assim ainda mais seus ganhos recentes de peixes. Recursos adicionais incluem: rankings do servidor, jogos de apostas virtuais, baús do tesouro, cargos compráveis e mais!
bot.card.fishery.subtitle = L.fishery
bot.card.nsfw.title = NSFW
bot.card.nsfw.desc = Uma grande quantidade de comandos nsfw; todos os resultados são filtrados para melhor qualidade! Você pode até solicitar até 20 imagens, gifs e vídeos de uma vez!
bot.card.nsfw.subtitle =
bot.card.alerts.title = Alertas
bot.card.alerts.desc = Deixe o Lawliet postar automaticamente as notícias mais recentes de anime, lançamentos do crunchyroll, postagens do reddit, status da Twitch e muito mais! Basta adicionar um alerta ao canal!
bot.card.alerts.subtitle = L.alerts
bot.card.mod.title = Moderação
bot.card.mod.desc = Advertir, Expulsar, Ban Temporário, Ban Permanente, Silenciar, Filtro de Palavras, Filtro de Convites - Tudo que você precisa para manter seu servidor civilizado!
